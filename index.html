<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qentro | Private Access</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 20%),
        linear-gradient(135deg, #050505, #0d0d0d 45%, #111 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 28px;
    }

    .hero, .panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 40px;
    }

    h1 {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .lead {
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }

    .panel h2 {
      margin-bottom: 20px;
    }

    .btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .btn strong {
      display: block;
      font-size: 16px;
    }

    .btn span {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    }

    .arrow {
      font-size: 22px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="hero">
      <h1>Not everyone gets in.</h1>
      <p class="lead">
        Qentro is a private network.  
        Only selected users are accepted.
      </p>
    </div>

    <div class="panel">
      <h2>Giriş Seçenekleri</h2>

      <!-- ÜYE GİRİŞİ -->
      <a class="btn" href="uyegiris.html">
        <div>
          <strong>Üye Girişi</strong>
          <span>Onaylı üyeler için giriş</span>
        </div>
        <div class="arrow">›</div>
      </a>

      <!-- REFERANSLI -->
      <a class="btn" href="referans.html">
        <div>
          <strong>Referanslı Üyelik Başvurusu Yap</strong>
          <span>Referansı olan kullanıcılar için öncelikli başvuru</span>
        </div>
        <div class="arrow">›</div>
      </a>

      <!-- NORMAL BAŞVURU -->
      <a class="btn" href="basvuru.html">
        <div>
          <strong>Üyelik Başvurusu Yap</strong>
          <span>Referansı olmayan kullanıcılar için başvuru</span>
        </div>
        <div class="arrow">›</div>
      </a>

    </div>

  </div>
</body>
</html>
