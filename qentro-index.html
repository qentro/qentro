<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qentro</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 640px;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 28px;
      background: rgba(255,255,255,0.03);
    }
    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      color: #c9b183;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 18px;
      font-size: 56px;
      letter-spacing: 0.14em;
    }
    p {
      color: #b5b5b5;
      font-size: 18px;
      line-height: 1.8;
      margin: 0 auto 28px;
      max-width: 460px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .note {
      margin-top: 18px;
      color: #777;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Private Network</div>
    <h1>QENTRO</h1>
    <p>
      Private network.<br>
      Limited access.<br><br>
      Not everyone gets in.
    </p>
    <button onclick="alert('Application coming soon')">REQUEST ACCESS</button>
    <div class="note">Entry is earned, not given.</div>
  </div>
</body>
</html>
